name: Notify MDX-Back on main update

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger project update
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.PROJECT_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/madeu2100-ctrl/MDX-Back/dispatches \
            -d '{"event_type":"whatsmeow-updated"}'
